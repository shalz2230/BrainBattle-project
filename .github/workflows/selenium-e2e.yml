name: BrainBattle Full E2E & Mobile Test Verification

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  e2e-and-mobile:
    name: Selenium E2E & Mobile Test Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install E2E Dependencies
        working-directory: BrainBattleE2E
        run: npm install

      - name: Run Full Verification Suite
        run: node BrainBattleE2E/scripts/verify_and_report.js
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

      - name: Verify Mobile Test Files Present
        run: |
          echo "## 📱 Mobile Test Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "BrainBattle" ]; then
            echo "✅ Mobile app directory found" >> $GITHUB_STEP_SUMMARY
            find BrainBattle -name "*.test.*" 2>/dev/null | head -10 | while read f; do
              echo "- ✅ \`$f\`" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "ℹ️ Mobile app directory not present in this branch" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Verification Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brainbattle-full-test-report
          path: BrainBattleE2E/brainbattle-e2e-report.xlsx
          if-no-files-found: ignore
          retention-days: 30
