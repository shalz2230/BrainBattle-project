name: E2E Selenium Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    name: Run E2E Selenium Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Node.js (shared for frontend + tests) ───────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            BrainBattleWeb/package-lock.json
            BrainBattleE2E/package-lock.json

      # ── 3. Chrome (stable, headless-compatible) ────────────────────
      - name: Install Google Chrome
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # ── 4. Build Frontend ──────────────────────────────────────────
      - name: Install Frontend Dependencies
        working-directory: ./BrainBattleWeb
        run: npm ci

      - name: Build Frontend (Vite)
        working-directory: ./BrainBattleWeb
        run: npm run build
        env:
          VITE_API_URL: https://brainbattlewebbackend.onrender.com

      # ── 5. Serve built frontend with a simple static server ────────
      - name: Serve Frontend (static)
        run: |
          npm install -g serve
          serve -s BrainBattleWeb/dist -l 5173 --no-clipboard &
          echo "Static server PID: $!"
          echo "Waiting for server to start..."
          sleep 3
          curl -s http://127.0.0.1:5173 | head -5 || echo "Server may not be ready yet"

      - name: Wait for Frontend to be ready
        run: |
          npx --yes wait-on http://127.0.0.1:5173 --timeout 30000
          echo "Frontend is up!"

      # ── 6. E2E Tests ───────────────────────────────────────────────
      - name: Install E2E Test Dependencies
        working-directory: ./BrainBattleE2E
        run: npm ci

      - name: Run E2E Selenium Tests
        working-directory: ./BrainBattleE2E
        run: npm test
        env:
          TEST_BASE_URL: http://127.0.0.1:5173/brainbattlewebfrontend
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
          DISPLAY: ':99'
        continue-on-error: true

      # ── 7. Job Summary (fallback if reporter didn't write it) ──────
      - name: Write Job Summary (fallback)
        if: always()
        run: |
          if [ ! -s "$GITHUB_STEP_SUMMARY" ]; then
            echo "## 🧪 E2E Selenium Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ⚠️ Tests completed. See the 'Run E2E Selenium Tests' step logs for details." >> $GITHUB_STEP_SUMMARY
          fi

      # ── 8. Upload Report Artifact ──────────────────────────────────
      - name: Upload Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: BrainBattleE2E/selenium-report.xlsx
          if-no-files-found: ignore
          retention-days: 30
