name: E2E Selenium Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./BrainBattleWeb
        run: npm install

      - name: Start Frontend in Background
        working-directory: ./BrainBattleWeb
        run: npm run dev &
        env:
          VITE_API_URL: https://brainbattlebackend.onrender.com

      - name: Wait for Frontend to be ready
        run: |
          echo "Waiting for frontend..."
          curl --retry-connrefused --retry 10 --retry-delay 2 -s -o /dev/null http://127.0.0.1:5173 || true

      - name: Set up Python (for Selenium)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Test Dependencies
        run: |
          pip install selenium pytest pytest-excel webdriver-manager

      - name: Run E2E Selenium Tests & Generate Excel Report
        run: |
          pytest tests/ --excelreport=selenium-report.xlsx

      - name: Upload Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: selenium-report.xlsx
          retention-days: 7
