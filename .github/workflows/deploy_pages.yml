name: 🚀 Deploy E2E Test Dashboard to GitHub Pages

on:
  workflow_run:
    workflows: ["🌐 Web App Tests — Selenium + Unit"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 📥 Download Web Results
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: web_tests.yml
          name: Web-Full-E2E-Report
          path: artifacts/web
          search_artifacts: true
        continue-on-error: true

      - name: 📥 Download Android Results
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: android_tests.yml
          name: Appium-Test-Report
          path: artifacts/android
          search_artifacts: true
        continue-on-error: true

      - name: 🛠️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📊 Generate HTML Dashboard
        run: |
          cp artifacts/web/web_results.json . || true
          cp artifacts/android/android_results.json . || true
          node report_generator/generate_html_report.js
          touch report_generator/public/.nojekyll

      - name: 🚀 Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./report_generator/public
