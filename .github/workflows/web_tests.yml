name: 🌐 Web App Tests — Selenium + Unit

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Pure Logic Unit Tests (no browser, instant)
  # Covers TC-W-U-001 to TC-W-U-020
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: 🔬 Unit Tests (Pure Logic)
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: BrainBattleE2E/package-lock.json

      - name: 📦 Install E2E Dependencies
        working-directory: BrainBattleE2E
        run: npm install

      - name: 🔬 Run Unit Tests (no browser needed)
        working-directory: BrainBattleE2E
        run: |
          npx mocha tests/validation_unit_security.test.js \
            --timeout 30000 \
            --grep "Unit Tests" \
            --reporter json \
            --reporter-option output=unit-test-results.json \
            || true
          npx mocha tests/validation_unit_security.test.js \
            --timeout 30000 \
            --grep "Unit Tests" \
            --reporter spec
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Backend Startup + Selenium E2E Tests
  # ─────────────────────────────────────────────────────────────
  e2e-tests:
    name: 🌐 E2E Selenium Tests (UI + Functional + Validation + Security)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      # ── Python + Flask Backend ────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: BrainBattleBackend/requirements.txt

      - name: 📦 Install Backend Dependencies
        working-directory: BrainBattleBackend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🗄️ Wipe & Recreate Fresh Database
        working-directory: BrainBattleBackend
        run: |
          rm -f database/db.sqlite3
          mkdir -p database
          echo "✅ Clean database directory ready"

      - name: 🌱 Seed Test User (werkzeug hash — matches app)
        working-directory: BrainBattleBackend
        env:
          SECRET_KEY: "ci-test-secret-key"
          CORS_ORIGINS: "*"
          FLASK_DEBUG: "false"
        run: |
          python - <<'EOF'
          import sys, os
          sys.path.insert(0, '.')
          os.environ.setdefault('SECRET_KEY', 'ci-test-secret-key')
          os.environ.setdefault('CORS_ORIGINS', '*')

          from app import create_app
          from database.db import db
          from models.user_model import User
          from werkzeug.security import generate_password_hash

          app = create_app()
          with app.app_context():
              db.drop_all()
              db.create_all()
              hashed = generate_password_hash('test1234')
              db.session.add(User('TestUser', 'test@brainbattle.com', hashed))
              db.session.commit()
              print(f"✅ Seeded {User.query.count()} user(s)")
          EOF

      - name: 🚀 Start Flask Backend
        working-directory: BrainBattleBackend
        env:
          SECRET_KEY: "ci-test-secret-key"
          CORS_ORIGINS: "*"
          FLASK_DEBUG: "false"
          FLASK_HOST: "127.0.0.1"
          FLASK_PORT: "5000"
        run: |
          python app.py &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 15); do
            sleep 2
            curl -sf http://127.0.0.1:5000/ > /dev/null 2>&1 && \
              echo "✅ Backend up (attempt $i)" && break
            echo "⏳ attempt $i..."
          done
          curl -sf http://127.0.0.1:5000/ || (echo "❌ Backend failed" && exit 1)

      - name: 🔐 Smoke-test Login API
        run: |
          R=$(curl -sf -X POST http://127.0.0.1:5000/api/auth/login \
               -H "Content-Type: application/json" \
               -d '{"email":"test@brainbattle.com","password":"test1234"}')
          echo "Response: $R"
          echo "$R" | grep -q '"status":"success"' && \
            echo "✅ Login OK" || (echo "❌ Login failed" && exit 1)

      # ── Node + React Web App ──────────────────────────────────
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: BrainBattleWeb/package-lock.json

      - name: 📦 Install Web App Dependencies
        working-directory: BrainBattleWeb
        run: npm install

      - name: 🏗️ Build Web App (base = / for CI)
        working-directory: BrainBattleWeb
        env:
          VITE_API_URL: "http://127.0.0.1:5000"
        run: |
          # Override base to / so the preview server works at http://127.0.0.1:5173/
          npx vite build --base /

      - name: 🚀 Start Vite Preview
        working-directory: BrainBattleWeb
        run: |
          npx vite preview --host 127.0.0.1 --port 5173 --base / &
          echo "VITE_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 10); do
            sleep 2
            curl -sf http://127.0.0.1:5173/ > /dev/null 2>&1 && \
              echo "✅ Vite up (attempt $i)" && break
            echo "⏳ attempt $i..."
          done
          curl -sf http://127.0.0.1:5173/ || (echo "❌ Vite failed" && exit 1)

      # ── Chrome ────────────────────────────────────────────────
      - name: 🌐 Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 🔧 Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: 📦 Install E2E Test Dependencies
        working-directory: BrainBattleE2E
        run: npm install

      # ── Run Each Category ─────────────────────────────────────
      - name: 🎨 TC-W-UI-001..025 — UI/UX Tests
        working-directory: BrainBattleE2E
        env:
          TEST_BASE_URL: "http://127.0.0.1:5173"
          TEST_EMAIL: "test@brainbattle.com"
          TEST_PASS: "test1234"
          API_URL: "http://127.0.0.1:5000"
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          npx mocha tests/ui_ux.test.js --timeout 90000 \
            --reporter ./utils/excelReporter.js || true
          mv selenium-report.xlsx ui-ux-report.xlsx 2>/dev/null || true
        continue-on-error: true

      - name: ⚙️ TC-W-F-001..030 — Functional Tests
        working-directory: BrainBattleE2E
        env:
          TEST_BASE_URL: "http://127.0.0.1:5173"
          TEST_EMAIL: "test@brainbattle.com"
          TEST_PASS: "test1234"
          API_URL: "http://127.0.0.1:5000"
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          npx mocha tests/functional.test.js --timeout 90000 \
            --reporter ./utils/excelReporter.js || true
          mv selenium-report.xlsx functional-report.xlsx 2>/dev/null || true
        continue-on-error: true

      - name: ✅ TC-W-V-001..015 — Validation Tests
        working-directory: BrainBattleE2E
        env:
          TEST_BASE_URL: "http://127.0.0.1:5173"
          TEST_EMAIL: "test@brainbattle.com"
          TEST_PASS: "test1234"
          API_URL: "http://127.0.0.1:5000"
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          npx mocha tests/validation_unit_security.test.js \
            --grep "Validation Test Suite" --timeout 90000 \
            --reporter ./utils/excelReporter.js || true
          mv selenium-report.xlsx validation-report.xlsx 2>/dev/null || true
        continue-on-error: true

      - name: 🛡️ TC-W-SEC-001..010 — Security Tests
        working-directory: BrainBattleE2E
        env:
          TEST_BASE_URL: "http://127.0.0.1:5173"
          TEST_EMAIL: "test@brainbattle.com"
          TEST_PASS: "test1234"
          API_URL: "http://127.0.0.1:5000"
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          npx mocha tests/validation_unit_security.test.js \
            --grep "Security" --timeout 90000 \
            --reporter ./utils/excelReporter.js || true
          mv selenium-report.xlsx security-report.xlsx 2>/dev/null || true
        continue-on-error: true

      # ── Upload Artifacts ──────────────────────────────────────
      - name: 📤 Artifact — UI/UX Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Web-UIUX-Test-Report
          path: BrainBattleE2E/ui-ux-report.xlsx
          retention-days: 30
          if-no-files-found: ignore

      - name: 📤 Artifact — Functional Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Web-Functional-Test-Report
          path: BrainBattleE2E/functional-report.xlsx
          retention-days: 30
          if-no-files-found: ignore

      - name: 📤 Artifact — Validation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Web-Validation-Test-Report
          path: BrainBattleE2E/validation-report.xlsx
          retention-days: 30
          if-no-files-found: ignore

      - name: 📤 Artifact — Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Web-Security-Test-Report
          path: BrainBattleE2E/security-report.xlsx
          retention-days: 30
          if-no-files-found: ignore

      - name: 📤 Upload Combined Full Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Web-Full-Test-Report-ALL
          path: |
            BrainBattleE2E/ui-ux-report.xlsx
            BrainBattleE2E/functional-report.xlsx
            BrainBattleE2E/validation-report.xlsx
            BrainBattleE2E/security-report.xlsx
          retention-days: 30
          if-no-files-found: ignore

      # ── 8. Cleanup ─────────────────────────────────────────────
      - name: 🧹 Stop Background Servers
        if: always()
        run: |
          kill $BACKEND_PID 2>/dev/null || true
          kill $VITE_PID    2>/dev/null || true
