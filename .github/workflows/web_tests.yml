name: 🌐 Web App Tests — Selenium + Unit

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Pure Logic Unit Tests (no browser, instant)
  # Covers TC-W-U-001 to TC-W-U-020
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: 🔬 Unit Tests (Pure Logic)
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: BrainBattleE2E/package-lock.json

      - name: 📦 Install E2E Dependencies
        working-directory: BrainBattleE2E
        run: npm install

      - name: 🔬 Run Unit Tests (no browser needed)
        working-directory: BrainBattleE2E
        run: |
          npx mocha tests/validation_unit_security.test.js \
            --timeout 30000 \
            --grep "Unit Tests" \
            --reporter json \
            --reporter-option output=unit-test-results.json \
            || true
          npx mocha tests/validation_unit_security.test.js \
            --timeout 30000 \
            --grep "Unit Tests" \
            --reporter spec
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Backend Startup + Selenium E2E Tests
  # ─────────────────────────────────────────────────────────────
  e2e-tests:
    name: 🌐 E2E Selenium Tests (UI + Functional + Validation + Security)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      # ── Python + Flask Backend ────────────────────────────────
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: BrainBattleBackend/requirements.txt

      - name: 📦 Install Backend Dependencies
        working-directory: BrainBattleBackend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🗄️ Wipe & Recreate Fresh Database
        working-directory: BrainBattleBackend
        run: |
          rm -f database/db.sqlite3
          mkdir -p database
          echo "✅ Clean database directory ready"

      - name: 🌱 Seed Test User (werkzeug hash — matches app)
        working-directory: BrainBattleBackend
        env:
          SECRET_KEY: "ci-test-secret-key"
          CORS_ORIGINS: "*"
          FLASK_DEBUG: "false"
        run: |
          python - <<'EOF'
          import sys, os
          sys.path.insert(0, '.')
          os.environ.setdefault('SECRET_KEY', 'ci-test-secret-key')
          os.environ.setdefault('CORS_ORIGINS', '*')

          from app import create_app
          from database.db import db
          from models.user_model import User
          from werkzeug.security import generate_password_hash

          app = create_app()
          with app.app_context():
              db.drop_all()
              db.create_all()
              hashed = generate_password_hash('test1234')
              db.session.add(User('TestUser', 'test@brainbattle.com', hashed))
              db.session.commit()
              print(f"✅ Seeded {User.query.count()} user(s)")
          EOF

      # ── Node + React Web App ──────────────────────────────────
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: BrainBattleWeb/package-lock.json

      - name: 📦 Install Web App Dependencies
        working-directory: BrainBattleWeb
        run: npm install

      - name: 🏗️ Build Web App (base = / for CI)
        working-directory: BrainBattleWeb
        env:
          VITE_API_URL: "http://127.0.0.1:5000"
        run: |
          npx vite build --base /

      # ── Chrome ────────────────────────────────────────────────
      - name: 🌐 Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 🔧 Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: 📦 Install E2E Test Dependencies
        working-directory: BrainBattleE2E
        run: npm install

      # ── Start Servers & Run E2E Tests ─────────────────────────
      - name: 🚀 Start Servers & Run Full E2E Tests
        working-directory: BrainBattleE2E
        env:
          SECRET_KEY: "ci-test-secret-key"
          CORS_ORIGINS: "*"
          FLASK_DEBUG: "false"
          FLASK_HOST: "127.0.0.1"
          FLASK_PORT: "5000"
          TEST_BASE_URL: "http://127.0.0.1:5173"
          TEST_EMAIL: "test@brainbattle.com"
          TEST_PASS: "test1234"
          API_URL: "http://127.0.0.1:5000"
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
        run: |
          echo "Starting Flask Backend..."
          cd ../BrainBattleBackend
          python app.py &
          BACKEND_PID=$!
          for i in $(seq 1 15); do sleep 2; curl -sf http://127.0.0.1:5000/ > /dev/null 2>&1 && break; done

          echo "Starting Vite Frontend..."
          cd ../BrainBattleWeb
          npx vite preview --host 127.0.0.1 --port 5173 --base / &
          VITE_PID=$!
          for i in $(seq 1 10); do sleep 2; curl -sf http://127.0.0.1:5173/ > /dev/null 2>&1 && break; done

          echo "Running Full E2E Tests..."
          cd ../BrainBattleE2E
          npx mocha tests/mega_web_1100.test.js --timeout 300000 --reporter ./utils/excelReporter.js || true
          mv selenium-report.xlsx full-e2e-report.xlsx 2>/dev/null || true

          echo "Stopping Servers..."
          kill $VITE_PID || true
          kill $BACKEND_PID || true
        continue-on-error: true

      # ── Upload Artifacts ──────────────────────────────────────
      - name: 📤 Artifact — Full E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Web-Full-E2E-Report
          path: |
            BrainBattleE2E/full-e2e-report.xlsx
            BrainBattleE2E/web_results.json
          retention-days: 30
          if-no-files-found: ignore
