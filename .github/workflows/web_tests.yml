##############################################################################
#
#  BrainBattle — 🌐 Web App Tests & Report
#
#  What it does:
#    1. Runs the full Selenium / Mocha E2E suite against the hosted GitHub
#       Pages frontend + hosted Render backend (no local server needed).
#    2. Generates a styled Excel report (selenium-report.xlsx).
#    3. Uploads ONLY the .xlsx as the workflow artifact.
#
#  Triggers: push / PR to main | master + manual dispatch
#
##############################################################################
name: 🌐 Web App — Selenium Report

on:
  push:
    branches: ["main", "master"]
    paths:
      - "BrainBattleWeb/**"
      - "BrainBattleE2E/**"
      - ".github/workflows/web_report.yml"
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: web-report-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selenium-report:
    name: 🌐 Selenium E2E — Excel Report
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Source ────────────────────────────────────────────────
      - name: ⬇️  Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node ─────────────────────────────────────────────────
      - name: 🟢  Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: BrainBattleE2E/package-lock.json

      - name: 📦  Install E2E dependencies
        working-directory: BrainBattleE2E
        run: npm install

      # ── 3. Chrome ────────────────────────────────────────────────
      - name: 🌐  Setup Chrome (stable)
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 🔧  Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: 📍  Locate ChromeDriver
        id: chromedriver
        run: echo "path=$(which chromedriver)" >> "$GITHUB_OUTPUT"

      # ── 4. Wait for hosted services ──────────────────────────────
      - name: ⏳  Wait for hosted backend (Render)
        run: |
          echo "Pinging backend..."
          for i in $(seq 1 20); do
            curl -sf https://brainbattlewebbackend.onrender.com/ > /dev/null 2>&1 && echo "✅ Backend ready" && break
            echo "  attempt $i — sleeping 5s"
            sleep 5
          done

      - name: ⏳  Wait for hosted frontend (GitHub Pages)
        run: |
          echo "Pinging frontend..."
          for i in $(seq 1 10); do
            curl -sf https://shalz2230.github.io/brainbattlewebfrontend/ > /dev/null 2>&1 && echo "✅ Frontend ready" && break
            echo "  attempt $i — sleeping 3s"
            sleep 3
          done

      # ── 5. Run Tests ─────────────────────────────────────────────
      - name: 🧪  Run full Selenium suite → Excel report
        id: selenium
        working-directory: BrainBattleE2E
        env:
          TEST_BASE_URL:       "https://shalz2230.github.io/brainbattlewebfrontend"
          TEST_EMAIL:          "test@brainbattle.com"
          TEST_PASS:           "test1234"
          API_URL:             "https://brainbattlewebbackend.onrender.com"
          SELENIUM_HEADLESS:   "true"
          CHROME_BIN:          ${{ steps.chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH:   ${{ steps.chromedriver.outputs.path }}
        run: |
          set +e
          node ./node_modules/mocha/bin/mocha.js tests/mega_web_1100.test.js \
            --timeout 300000 \
            --reporter ./utils/excelReporter.js
          EXIT=$?
          set -e
          # Ensure the report file is always at a known name
          [ -f selenium-report.xlsx ] && cp selenium-report.xlsx ../brainbattle-web-test-report.xlsx
          exit $EXIT
        continue-on-error: true

      # ── 6. Upload ONLY the xlsx ───────────────────────────────────
      - name: 📤  Upload Web Test Report (.xlsx)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BrainBattle-Web-Test-Report-${{ github.run_number }}
          path: brainbattle-web-test-report.xlsx
          retention-days: 30
          if-no-files-found: warn

      # ── 7. Step Summary ──────────────────────────────────────────
      - name: 📝  Write Step Summary
        if: always()
        run: |
          STATUS="${{ steps.selenium.outcome }}"
          [ "$STATUS" = "success" ] && BADGE="✅ Passed" || BADGE="❌ Failed / Partial"
          {
            echo "## 🌐 Web Selenium Test Report — $BADGE"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Frontend  | [GitHub Pages](https://shalz2230.github.io/brainbattlewebfrontend) |"
            echo "| Backend   | [Render API](https://brainbattlewebbackend.onrender.com) |"
            echo "| Commit    | \`${{ github.sha }}\` |"
            echo "| Branch    | \`${{ github.ref_name }}\` |"
            echo "| Run #     | \`${{ github.run_number }}\` |"
            echo ""
            echo "📥 Download **\`BrainBattle-Web-Test-Report-${{ github.run_number }}\`** from Artifacts for the full Excel report."
          } >> "$GITHUB_STEP_SUMMARY"
