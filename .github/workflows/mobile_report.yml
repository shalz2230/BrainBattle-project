##############################################################################
#
#  BrainBattle — 📱 Mobile App Tests & Report (Appium)
#
#  What it does:
#    1. Builds the debug APK from source.
#    2. Boots an Android API 29 emulator.
#    3. Calls BrainBattleAppium/scripts/ci_run_tests.sh (committed file —
#       no heredoc / indentation issues) which:
#         a. Installs APK via adb
#         b. Starts Appium server with health-check polling
#         c. Runs npx wdio run wdio.conf.js
#         d. wdio.conf.js after() hook writes appium-report.xlsx
#         e. Falls back to generateFallbackReport.js if after() never fired
#    4. Uploads ONLY the .xlsx artifact (no logs / html / xml).
#
#  Triggers: push / PR to main | master + manual dispatch
#
##############################################################################
name: 📱 Mobile App — Appium Report

on:
  push:
    branches: ["main", "master"]
    paths:
      - "BrainBattle/**"
      - "BrainBattleAppium/**"
      - ".github/workflows/mobile_report.yml"
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: mobile-report-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  JAVA_DIST: "temurin"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g"

jobs:
  appium-report:
    name: 📱 Appium E2E — Excel Report
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── 1. Source ────────────────────────────────────────────────
      - name: ⬇️  Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java + Gradle ─────────────────────────────────────────
      - name: ☕  Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: gradle

      - name: 🔧  Make Gradlew executable
        working-directory: BrainBattle
        run: chmod +x gradlew

      # ── 3. Node (for Appium + WDIO) ──────────────────────────────
      - name: 🟢  Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: BrainBattleAppium/package-lock.json

      - name: 📦  Install Appium project dependencies
        working-directory: BrainBattleAppium
        run: npm install

      - name: 📦  Install Appium server globally
        run: npm install -g appium

      # ── 4. Build APK ─────────────────────────────────────────────
      - name: 🏗️  Build debug APK
        working-directory: BrainBattle
        run: |
          ./gradlew assembleDebug --no-daemon
          APK=$(find . -name "app-debug.apk" | head -1)
          echo "APK_PATH=$(realpath "$APK")" >> "$GITHUB_ENV"
          echo "✅ APK: $(realpath "$APK")"

      # ── 5. KVM hardware acceleration ─────────────────────────────
      - name: ⚡  Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 6. Appium UiAutomator2 driver ────────────────────────────
      - name: 🤖  Install Appium UiAutomator2 driver
        run: appium driver install uiautomator2

      # ── 7. Make the committed CI script executable ────────────────
      - name: 🔧  Make ci_run_tests.sh executable
        run: chmod +x BrainBattleAppium/scripts/ci_run_tests.sh

      # ── 8. Boot emulator & run the script ────────────────────────
      #   IMPORTANT: reactivecircus/android-emulator-runner runs
      #   `script:` as a SINGLE /usr/bin/sh -c command. We pass a
      #   one-liner that calls our committed .sh file — no multi-line
      #   backslash continuations, no heredoc indentation bugs.
      - name: 📱  Boot emulator & run Appium tests
        uses: reactivecircus/android-emulator-runner@v2
        id: appium_run
        continue-on-error: true
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          avd-name: brainbattle_avd
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash "$GITHUB_WORKSPACE/BrainBattleAppium/scripts/ci_run_tests.sh"

      # ── 9. Guarantee xlsx exists even if step 8 errored ──────────
      - name: 📄  Ensure xlsx report exists (final fallback)
        if: always()
        run: |
          REPORT="${GITHUB_WORKSPACE}/brainbattle-mobile-test-report.xlsx"
          if [ ! -f "$REPORT" ]; then
            echo "⚠️  Report missing — generating emergency fallback..."
            cd BrainBattleAppium
            node utils/generateFallbackReport.js \
              --output "$REPORT" \
              --exit-code 1
          else
            echo "✅ Report already exists at: $REPORT"
          fi

      # ── 10. Upload ONLY the xlsx ──────────────────────────────────
      - name: 📤  Upload Mobile Test Report (.xlsx)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BrainBattle-Mobile-Test-Report-${{ github.run_number }}
          path: brainbattle-mobile-test-report.xlsx
          retention-days: 30
          if-no-files-found: error

      # ── 11. Step Summary ─────────────────────────────────────────
      - name: 📝  Write Step Summary
        if: always()
        run: |
          cd BrainBattleAppium
          node utils/generateSummary.js
