##############################################################################
#
#  BrainBattle — 📱 Mobile App Tests & Report (Appium)
#
#  What it does:
#    1. Builds the debug APK from source.
#    2. Boots an Android emulator (API 29, x86_64).
#    3. Starts the Appium server.
#    4. Runs the full WDIO / Mocha Appium suite.
#    5. The wdio.conf.js after-hook generates appium-report.xlsx
#       with columns: Test ID | Title | Category | Test Type | Status | Duration | Error
#    6. Uploads ONLY the .xlsx as the workflow artifact.
#
#  Triggers: push / PR to main | master + manual dispatch
#
##############################################################################
name: 📱 Mobile App — Appium Report

on:
  push:
    branches: ["main", "master"]
    paths:
      - "BrainBattle/**"
      - "BrainBattleAppium/**"
      - ".github/workflows/mobile_report.yml"
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: mobile-report-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  JAVA_DIST: "temurin"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g"

jobs:
  appium-report:
    name: 📱 Appium E2E — Excel Report
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── 1. Source ────────────────────────────────────────────────
      - name: ⬇️  Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java + Gradle ─────────────────────────────────────────
      - name: ☕  Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: gradle

      - name: 🔧  Make Gradlew executable
        working-directory: BrainBattle
        run: chmod +x gradlew

      # ── 3. Node (for Appium + WDIO) ──────────────────────────────
      - name: 🟢  Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: BrainBattleAppium/package-lock.json

      - name: 📦  Install Appium project dependencies
        working-directory: BrainBattleAppium
        run: npm install

      - name: 📦  Install Appium server globally
        run: npm install -g appium

      # ── 4. Build APK ─────────────────────────────────────────────
      - name: 🏗️  Build debug APK
        working-directory: BrainBattle
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace
          APK_PATH=$(find . -name "app-debug.apk" | head -1)
          echo "APK_PATH=$(realpath $APK_PATH)" >> "$GITHUB_ENV"
          echo "✅ APK built at: $(realpath $APK_PATH)"

      # ── 5. KVM hardware acceleration ─────────────────────────────
      - name: ⚡  Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 6. Appium driver install ──────────────────────────────────
      - name: 🤖  Install Appium UiAutomator2 driver
        run: appium driver install uiautomator2

      # ── 7. Run tests inside emulator ─────────────────────────────
      - name: 📱  Boot emulator, start Appium & run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          avd-name: brainbattle_avd
          disable-animations: true
          emulator-options: >-
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
          script: |
            # Wait for device to be fully booted
            adb wait-for-device
            adb shell input keyevent 82
            echo "📱 Device ready"

            # Install APK on the emulator
            echo "📦 Installing APK..."
            adb install -r "$APK_PATH"

            # Start Appium in background
            echo "🚀 Starting Appium..."
            appium --log-level error > /dev/null 2>&1 &
            APPIUM_PID=$!
            sleep 8
            echo "✅ Appium PID: $APPIUM_PID"

            # Run WDIO test suite — xlsx generated by wdio.conf.js after-hook
            echo "🧪 Running Appium test suite..."
            cd BrainBattleAppium
            set +e
            APPIUM_UDID="emulator-5554" \
            APPIUM_APP_PATH="$APK_PATH" \
            XLSX_OUTPUT="$(pwd)/appium-report.xlsx" \
              npx wdio run wdio.conf.js
            TEST_EXIT=$?
            set -e

            # Copy report to workspace root for artifact upload
            [ -f appium-report.xlsx ] && cp appium-report.xlsx ../brainbattle-mobile-test-report.xlsx
            echo "TEST_EXIT=$TEST_EXIT" >> "$GITHUB_ENV"
        continue-on-error: true
        id: appium_run

      # ── 8. Upload ONLY the xlsx ───────────────────────────────────
      - name: 📤  Upload Mobile Test Report (.xlsx)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BrainBattle-Mobile-Test-Report-${{ github.run_number }}
          path: brainbattle-mobile-test-report.xlsx
          retention-days: 30
          if-no-files-found: warn

      # ── 9. Step Summary ──────────────────────────────────────────
      - name: 📝  Write Step Summary
        if: always()
        run: |
          STATUS="${{ steps.appium_run.outcome }}"
          [ "$STATUS" = "success" ] && BADGE="✅ Passed" || BADGE="❌ Failed / Partial"
          {
            echo "## 📱 Mobile Appium Test Report — $BADGE"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Platform    | Android API 29 (x86_64 emulator) |"
            echo "| App Package | \`com.simats.brainbattle\` |"
            echo "| Framework   | Appium v3 + WebdriverIO + Mocha |"
            echo "| Commit      | \`${{ github.sha }}\` |"
            echo "| Branch      | \`${{ github.ref_name }}\` |"
            echo "| Run #       | \`${{ github.run_number }}\` |"
            echo ""
            echo "### 📋 Test Categories Covered"
            echo ""
            echo "| # | Category | Type |"
            echo "| --- | --- | --- |"
            echo "| 1 | Functional Testing      | Functionality Testing |"
            echo "| 2 | UI/UX Testing           | UI/UX Testing |"
            echo "| 3 | Compatibility Testing   | Compatibility Testing |"
            echo "| 4 | Performance Testing     | Performance Testing |"
            echo "| 5 | Security Testing        | Vulnerability Testing |"
            echo "| 6 | API Testing             | API Testing |"
            echo "| 7 | Database Testing        | Database Testing |"
            echo "| 8 | Accessibility Testing   | Accessibility Testing |"
            echo "| 9 | Mobile-Specific Testing | Mobile-Specific Testing |"
            echo "| 10 | Regression Testing     | Regression Testing |"
            echo "| 11 | End-to-End Testing     | E2E Testing |"
            echo ""
            echo "📥 Download **\`BrainBattle-Mobile-Test-Report-${{ github.run_number }}\`** from Artifacts for the full Excel report."
          } >> "$GITHUB_STEP_SUMMARY"
