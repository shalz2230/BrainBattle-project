name: BrainBattle Push Test Reports

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  generate-reports:
    name: Generate automated test reports
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create report directories
        run: |
          mkdir -p ci-reports/android-unit
          mkdir -p ci-reports/web-e2e
          mkdir -p ci-reports/backend-security
          mkdir -p ci-reports/appium
          mkdir -p BrainBattleE2E/test-artifacts

      - name: Install backend dependencies
        working-directory: BrainBattleBackend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend security verification
        id: backend_security
        continue-on-error: true
        working-directory: BrainBattleBackend
        run: |
          python scripts/security_verify.py
          cp scripts/security_report.json ../ci-reports/backend-security/security_report.json

      - name: Install Android unit test dependencies
        working-directory: BrainBattle
        run: chmod +x gradlew

      - name: Run Android unit tests
        id: android_unit
        continue-on-error: true
        working-directory: BrainBattle
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Collect Android unit report
        if: always()
        run: |
          cp -r BrainBattle/app/build/reports/tests/testDebugUnitTest/. ci-reports/android-unit/ 2>/dev/null || true
          cp -r BrainBattle/app/build/test-results/testDebugUnitTest ci-reports/android-unit/test-results 2>/dev/null || true

      - name: Install web app dependencies
        working-directory: BrainBattleWeb
        run: npm ci

      - name: Install E2E dependencies
        working-directory: BrainBattleE2E
        run: npm ci

      - name: Setup Chrome
        id: setup_chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Locate ChromeDriver
        id: chromedriver
        run: echo "path=$(which chromedriver)" >> "$GITHUB_OUTPUT"

      - name: Seed backend database
        working-directory: BrainBattleBackend
        env:
          SECRET_KEY: ci-test-secret
          CORS_ORIGINS: "*"
          FLASK_DEBUG: "false"
        run: |
          python - <<'PY'
          import os
          from app import create_app
          from database.db import db
          from models.user_model import User
          from werkzeug.security import generate_password_hash

          app = create_app()
          with app.app_context():
              db.drop_all()
              db.create_all()
              db.session.add(User("TestUser", "test@brainbattle.com", generate_password_hash("test1234")))
              db.session.commit()
              print("Seeded test@brainbattle.com")
          PY

      - name: Start backend and web servers
        env:
          SECRET_KEY: ci-test-secret
          CORS_ORIGINS: "*"
          FLASK_DEBUG: "false"
          FLASK_HOST: 127.0.0.1
          FLASK_PORT: "5000"
          VITE_API_URL: http://127.0.0.1:5000/
        run: |
          python BrainBattleBackend/app.py > ci-reports/backend-security/backend.log 2>&1 &
          echo $! > ci-reports/backend-security/backend.pid
          npm --prefix BrainBattleWeb run dev -- --host 127.0.0.1 --port 5173 > ci-reports/web-e2e/vite.log 2>&1 &
          echo $! > ci-reports/web-e2e/vite.pid
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:5000/ >/dev/null && break
            sleep 2
          done
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:5173/ >/dev/null && break
            sleep 2
          done

      - name: Run web E2E suite and generate Excel report
        id: web_e2e
        continue-on-error: true
        working-directory: BrainBattleE2E
        env:
          TEST_BASE_URL: http://127.0.0.1:5173
          TEST_EMAIL: test@brainbattle.com
          TEST_PASS: test1234
          API_URL: http://127.0.0.1:5000
          SELENIUM_HEADLESS: "true"
          CHROME_BIN: ${{ steps.setup_chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.chromedriver.outputs.path }}
          E2E_ARTIFACT_DIR: test-artifacts
        run: npm run test

      - name: Collect web E2E reports
        if: always()
        run: |
          cp BrainBattleE2E/selenium-report.xlsx ci-reports/web-e2e/selenium-report.xlsx 2>/dev/null || true
          cp BrainBattleE2E/web_results.json ci-reports/web-e2e/web_results.json 2>/dev/null || true
          cp -r BrainBattleE2E/test-artifacts ci-reports/web-e2e/test-artifacts 2>/dev/null || true

      - name: Collect Appium reports if present
        if: always()
        run: |
          cp BrainBattleAppium/android_results.json ci-reports/appium/android_results.json 2>/dev/null || true
          cp BrainBattleAppium/wdio-test.log ci-reports/appium/wdio-test.log 2>/dev/null || true
          cp BrainBattleAppium/appium-server.log ci-reports/appium/appium-server.log 2>/dev/null || true

      - name: Generate consolidated Markdown summary
        if: always()
        run: |
          {
            echo "# BrainBattle Automated Test Report"
            echo
            echo "Generated for commit: \`${GITHUB_SHA}\`"
            echo
            echo "| Suite | Result | Report path |"
            echo "| --- | --- | --- |"
            echo "| Backend security verification | ${{ steps.backend_security.outcome }} | ci-reports/backend-security/security_report.json |"
            echo "| Android unit tests | ${{ steps.android_unit.outcome }} | ci-reports/android-unit/index.html |"
            echo "| Web Selenium E2E tests | ${{ steps.web_e2e.outcome }} | ci-reports/web-e2e/selenium-report.xlsx |"
            echo "| Appium mobile E2E reports | collected-if-present | ci-reports/appium/ |"
            echo
            echo "## Test Case Catalog"
            echo
            echo "The repository includes \`TEST_CASES_100_PLUS.md\` with 135 functionality, UI/UX, validation, vulnerability/security, unit, and reporting test cases."
          } > ci-reports/REPORT_SUMMARY.md
          cat ci-reports/REPORT_SUMMARY.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload consolidated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BrainBattle-Test-Reports-${{ github.run_number }}
          path: |
            ci-reports/
            TEST_CASES_100_PLUS.md
            BrainBattle/TEST_CASES.md
          retention-days: 30
          if-no-files-found: ignore
