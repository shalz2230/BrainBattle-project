name: BrainBattle Frontend Build Verification

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-verify:
    name: Frontend Build & Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BrainBattleWeb/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: BrainBattleWeb
        run: npm install

      - name: Build BrainBattleWeb (Vite)
        working-directory: BrainBattleWeb
        run: npm run build
        env:
          VITE_API_URL: https://brainbattlewebbackend.onrender.com

      - name: Verify Build Output
        run: |
          echo "## 🏗️ Frontend Build Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "BrainBattleWeb/dist" ]; then
            echo "✅ **Build succeeded!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            FILE_COUNT=$(find BrainBattleWeb/dist -type f | wc -l)
            TOTAL_SIZE=$(du -sh BrainBattleWeb/dist | cut -f1)
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| 📁 Total Files | $FILE_COUNT |" >> $GITHUB_STEP_SUMMARY
            echo "| 💾 Bundle Size | $TOTAL_SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| 🌐 Deploy Target | GitHub Pages (brainbattlewebfrontend) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build output not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Build Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brainbattle-frontend-dist
          path: BrainBattleWeb/dist
          if-no-files-found: warn
          retention-days: 7
