name: 🌐 Web App — Deploy, 1100 E2E Tests & Security Review

on:
  push:
    branches: ["main", "master"]
    paths:
      - "BrainBattleWeb/**"
      - "BrainBattleE2E/**"
      - ".github/workflows/deploy-and-test.yml"
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy-and-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-and-test:
    name: 🌐 Build · Deploy · 1100 E2E Tests · Web Security Review
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: ⬇️  Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: 🟢  Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            BrainBattleWeb/package-lock.json
            BrainBattleE2E/package-lock.json

      # ── 3. Build Frontend ──────────────────────────────────────────────────
      - name: 📦  Install Web dependencies
        working-directory: BrainBattleWeb
        run: npm install

      - name: 🏗️  Build Web Application
        working-directory: BrainBattleWeb
        env:
          VITE_API_URL: "https://brainbattlewebbackend.onrender.com"
        run: npm run build

      # ── 4. Start Local Server & Determine Test Target ─────────────────────
      - name: 🌐  Start Local Server & Determine Test Target
        run: |
          echo "====================================================="
          echo "🌐 STARTING LOCAL FRONTEND FOR E2E TESTING"
          echo "====================================================="
          cd BrainBattleWeb
          npx vite preview --port 5173 --host 127.0.0.1 --base /BrainBattle-project/ &
          VITE_PID=$!
          echo "Vite preview server starting with PID: $VITE_PID"
          cd ..
          sleep 4
          curl -sI http://127.0.0.1:5173/BrainBattle-project/ || echo "Local server not reachable yet"
          echo "TEST_BASE_URL=http://127.0.0.1:5173/BrainBattle-project" >> "$GITHUB_ENV"

      # ── 5. Install E2E Dependencies ───────────────────────────────────────
      - name: 📦  Install E2E dependencies
        working-directory: BrainBattleE2E
        run: npm install

      # ── 6. Run Web Frontend Security Suite ───────────────────────────────
      - name: 🛡️  Run Web Frontend Security Suite
        run: |
          echo "====================================================="
          echo "🌐 WEB FRONTEND SECURITY ANALYSIS"
          echo "====================================================="
          NODE_PATH="${GITHUB_WORKSPACE}/BrainBattleE2E/node_modules" \
            node BrainBattleE2E/scripts/generateWebSecuritySuite.js

      # ── 7. Setup Chrome & ChromeDriver ────────────────────────────────────
      - name: 🌐  Setup Chrome (stable)
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 🔧  Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: 📍  Locate ChromeDriver
        id: chromedriver
        run: echo "path=$(which chromedriver)" >> "$GITHUB_OUTPUT"

      # ── 8. Run 1100 Selenium E2E Tests ────────────────────────────────────
      - name: 🧪  Run 1100 Selenium E2E Tests (110 categories × 10 tests)
        id: selenium
        working-directory: BrainBattleE2E
        env:
          TEST_BASE_URL:     "${{ env.TEST_BASE_URL }}"
          TEST_EMAIL:        "test@brainbattle.com"
          TEST_PASS:         "test1234"
          API_URL:           "https://brainbattlewebbackend.onrender.com"
          SELENIUM_HEADLESS: "true"
          CHROME_BIN:        ${{ steps.chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.chromedriver.outputs.path }}
          E2E_ARTIFACT_DIR:  "${{ github.workspace }}/Test_Results/Screenshots"
        run: |
          mkdir -p "${{ github.workspace }}/Test_Results/Excel"
          mkdir -p "${{ github.workspace }}/Test_Results/HTML"
          mkdir -p "${{ github.workspace }}/Test_Results/Screenshots"
          mkdir -p "${{ github.workspace }}/Test_Results/Logs"
          mkdir -p "${{ github.workspace }}/Test_Results/Summary"

          set +e
          node ./node_modules/mocha/bin/mocha.js tests/mega_web_1100.test.js \
            --timeout 600000 \
            --reporter ./utils/excelReporter.js
          EXIT=$?
          set -e

          [ -f selenium-report.xlsx ]    && mv selenium-report.xlsx    "${{ github.workspace }}/Test_Results/Excel/Automation_Test_Report.xlsx"
          [ -f execution-report.html ]   && mv execution-report.html   "${{ github.workspace }}/Test_Results/HTML/execution-report.html"

          {
            echo "# 🌐 BrainBattle Web — E2E Test Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Deployment URL** | https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/ |"
            echo "| **Build Number** | ${{ github.run_number }} |"
            echo "| **Execution Date** | $(date '+%d %B %Y %H:%M UTC') |"
            echo "| **Test Suite** | 1100 Selenium Tests (110 categories × 10 tests) |"
            if [ "$EXIT" -eq 0 ]; then
              echo "| **Result** | ✅ ALL PASSED |"
            else
              echo "| **Result** | ⚠️ Partial Pass — see artifacts |"
            fi
            echo ""
            echo "📊 [Download Excel Report (Artifact)](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "🌐 [View Live HTML Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/latest/execution-report.html)"
          } > "${{ github.workspace }}/Test_Results/Summary/summary.md"

          exit $EXIT
        continue-on-error: true

      # ── 9. k6 Load Tests ─────────────────────────────────────────────────
      - name: 🛠️  Setup k6
        uses: grafana/setup-k6-action@v1

      - name: 📈  Run k6 Baseline Load Test
        uses: grafana/run-k6-action@v1
        with:
          path: BrainBattleBackend/scripts/load-test.js
          flags: --env BACKEND_URL=https://brainbattlewebbackend.onrender.com/

      # ── 10. Copy HTML reports into built dist for unified deployment ─────────
      - name: 📁  Inject E2E Reports into Build Dist
        if: always()
        run: |
          mkdir -p BrainBattleWeb/dist/reports/latest
          mkdir -p BrainBattleWeb/dist/reports/history/build-${{ github.run_number }}
          [ -f Test_Results/HTML/execution-report.html ] && cp Test_Results/HTML/execution-report.html BrainBattleWeb/dist/reports/latest/execution-report.html
          [ -f Test_Results/HTML/execution-report.html ] && cp Test_Results/HTML/execution-report.html BrainBattleWeb/dist/reports/history/build-${{ github.run_number }}/execution-report.html

      # ── 11. Upload All Artifacts ──────────────────────────────────────────
      - name: 📤  Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BrainBattle-Web-E2E-Results-${{ github.run_number }}
          path: Test_Results/
          retention-days: 30

      - name: 📤  Upload Web Security Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BrainBattle-Web-Security-Review-${{ github.run_number }}
          path: Web_Security_Results/
          retention-days: 30

      # ── 12. Deploy Unified App and Reports to GitHub Pages ───────────────
      - name: 📤  Upload Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: BrainBattleWeb/dist

      - name: 🚀  Deploy Unified Bundle to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      # ── 13. Write Full GitHub Actions Step Summary ────────────────────────
      - name: 📝  Write Complete Step Summary
        if: always()
        run: |
          # ── Header ──────────────────────────────────────────────────────
          {
            echo "# 🌐 BrainBattle Web — Full CI Summary"
            echo ""
            echo "> **Run:** #${{ github.run_number }} | **Branch:** \`${{ github.ref_name }}\` | **Date:** $(date '+%d %B %Y %H:%M UTC')"
            echo ""
            echo "---"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # ── E2E Test Summary ─────────────────────────────────────────────
          SUMMARY_FILE="${{ github.workspace }}/Test_Results/Summary/summary.md"
          if [ -f "$SUMMARY_FILE" ]; then
            cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ⚠️ E2E summary not generated — check test runner logs." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # ── Web Security Executive Summary ───────────────────────────────
          WEB_SEC="${{ github.workspace }}/Web_Security_Results/web-executive-summary.md"
          if [ -f "$WEB_SEC" ]; then
            cat "$WEB_SEC" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ⚠️ Web security summary not generated — check security suite logs." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # ── Web Security Full Review ─────────────────────────────────────
          WEB_REV="${{ github.workspace }}/Web_Security_Results/web-security-review.md"
          if [ -f "$WEB_REV" ]; then
            cat "$WEB_REV" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ⚠️ Web security review not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── 14. Zero-Critical Web Security Gate ──────────────────────────────
      - name: 🚨  Enforce Zero-Critical Web Security Policy
        if: always()
        run: |
          EXEC="${{ github.workspace }}/Web_Security_Results/web-executive-summary.md"
          if [ -f "$EXEC" ]; then
            CRIT=$(grep -oP '🔴 Critical \| \*\*\K[0-9]+' "$EXEC" || echo "0")
            echo "Critical web security findings: $CRIT"
            if [ "$CRIT" -gt 0 ]; then
              echo "❌ BUILD FAILED: ${CRIT} Critical web security finding(s) found."
              exit 1
            else
              echo "✅ Zero Critical web security findings — policy passed."
            fi
          else
            echo "⚠️ Web security executive summary not found — skipping gate."
          fi
