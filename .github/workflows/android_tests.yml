name: 📱 Android App Tests — Appium & Unit

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  android-unit-tests:
    name: 🔬 Android Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: 🔧 Grant Execute Permission for Gradlew
        working-directory: BrainBattle
        run: chmod +x gradlew

      - name: 🔬 Run Unit Tests
        working-directory: BrainBattle
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: 📊 Upload Unit Test HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Android-Unit-Test-Report-HTML
          path: BrainBattle/app/build/reports/tests/testDebugUnitTest/
          retention-days: 30
          if-no-files-found: ignore

  appium-tests:
    name: 🤖 Appium E2E Tests (100+ Cases)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix:
        api-level: [28]
        target: [google_apis]
        arch: [x86_64]

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: BrainBattleAppium/package-lock.json

      - name: 📦 Install Appium Dependencies
        working-directory: BrainBattleAppium
        run: |
          npm install
          npm install -g appium

      - name: 🔧 Build Debug APK for Appium
        working-directory: BrainBattle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: ⚡ Enable KVM for Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: 🤖 Run Appium Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          profile: Nexus 6
          avd-name: test_avd
          disable-animations: true
          script: |
            appium driver install uiautomator2
            appium &
            sleep 10
            cd BrainBattleAppium && npm run test || true

      - name: 📊 Upload Appium Log / Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Test-Report
          path: |
            BrainBattleAppium/android_results.json
          retention-days: 30
          if-no-files-found: ignore
