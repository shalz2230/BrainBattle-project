name: 📱 Mobile App — Deploy & Test

on:
  push:
    branches: ["main", "master"]
    paths:
      - "BrainBattle/**"
      - "BrainBattleAppium/**"
      - ".github/workflows/android-e2e.yml"
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: android-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  JAVA_DIST: "temurin"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g"

jobs:
  android-e2e:
    name: 📱 Build, Run Appium E2E & Publish Reports
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── 1. Source ────────────────────────────────────────────────
      - name: ⬇️  Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java + Gradle ─────────────────────────────────────────
      - name: ☕  Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}
          cache: gradle

      - name: 🔧  Make Gradlew executable
        working-directory: BrainBattle
        run: chmod +x gradlew

      # ── 3. Node (for Appium + WDIO) ──────────────────────────────
      - name: 🟢  Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: BrainBattleAppium/package-lock.json

      - name: 📦  Install Appium project dependencies
        working-directory: BrainBattleAppium
        run: npm install

      - name: 📦  Install Appium server globally
        run: npm install -g appium

      # ── 4. Build APK ─────────────────────────────────────────────
      - name: 🏗️  Build debug APK
        working-directory: BrainBattle
        run: |
          ./gradlew assembleDebug --no-daemon
          APK=$(find . -name "app-debug.apk" | head -1)
          echo "APK_PATH=$(realpath "$APK")" >> "$GITHUB_ENV"
          echo "✅ APK: $(realpath "$APK")"

      # ── 5. KVM hardware acceleration ─────────────────────────────
      - name: ⚡  Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── 6. Appium UiAutomator2 driver ────────────────────────────
      - name: 🤖  Install Appium UiAutomator2 driver
        run: appium driver install uiautomator2

      # ── 7. Make the committed CI script executable ────────────────
      - name: 🔧  Make ci_run_tests.sh executable
        run: chmod +x BrainBattleAppium/scripts/ci_run_tests.sh

      # ── 8. Boot emulator & run the script ────────────────────────
      - name: 📱  Boot emulator & run Appium tests
        uses: reactivecircus/android-emulator-runner@v2
        id: appium_run
        continue-on-error: true
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          avd-name: brainbattle_avd
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash "$GITHUB_WORKSPACE/BrainBattleAppium/scripts/ci_run_tests.sh"

      # ── 9. Collect and Standardize Test Results ──────────────────
      - name: 📁 Prepare Test Results Structure
        if: always()
        run: |
          mkdir -p "${{ github.workspace }}/Test Results/Excel"
          mkdir -p "${{ github.workspace }}/Test Results/HTML"
          mkdir -p "${{ github.workspace }}/Test Results/Screenshots"
          mkdir -p "${{ github.workspace }}/Test Results/Logs"
          mkdir -p "${{ github.workspace }}/Test Results/Summary"

          # Copy generated reports from Appium folder if they exist
          [ -f "${{ github.workspace }}/BrainBattleAppium/appium-report.xlsx" ] && cp "${{ github.workspace }}/BrainBattleAppium/appium-report.xlsx" "${{ github.workspace }}/Test Results/Excel/Automation_Test_Report.xlsx"
          [ -f "${{ github.workspace }}/BrainBattleAppium/execution-report.html" ] && cp "${{ github.workspace }}/BrainBattleAppium/execution-report.html" "${{ github.workspace }}/Test Results/HTML/execution-report.html"
          
          # Generate fallback HTML report if missing
          if [ ! -f "${{ github.workspace }}/Test Results/HTML/execution-report.html" ]; then
             echo "Generating fallback HTML..."
             cd BrainBattleAppium
             export HTML_OUTPUT="${{ github.workspace }}/Test Results/HTML/execution-report.html"
             node utils/generateHtmlReport.js
          fi

          # Build Action Summary Markdown
          STATUS="${{ steps.appium_run.outcome }}"
          [ "$STATUS" = "success" ] && BADGE="✅ Passed" || BADGE="❌ Failed / Partial"
          {
            echo "# Android Appium Test Summary"
            echo ""
            echo "Build Number: ${{ github.run_number }}"
            echo "Execution Date: $(date)"
            echo "Result: $BADGE"
            echo ""
            echo "Report URL:"
            echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/latest/execution-report.html"
          } > "${{ github.workspace }}/Test Results/Summary/summary.md"

      # ── 10. Upload Artifacts ──────────────────────────────────────
      - name: 📤  Upload Mobile E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BrainBattle-Mobile-E2E-Results-${{ github.run_number }}
          path: Test Results/
          retention-days: 30

      # ── 11. Publish HTML report to GitHub Pages ───────────────────
      - name: 🚀  Deploy HTML Report to Latest
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: Test Results/HTML
          branch: gh-pages
          target-folder: reports/latest
          clean: false

      - name: 🚀  Deploy HTML Report to History
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: Test Results/HTML
          branch: gh-pages
          target-folder: reports/history/build-${{ github.run_number }}
          clean: false

      # ── 12. Write GitHub Action Summary ──────────────────────────
      - name: 📝  Write Step Summary
        if: always()
        run: |
          cat "${{ github.workspace }}/Test Results/Summary/summary.md" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cd BrainBattleAppium
          node utils/generateSummary.js
