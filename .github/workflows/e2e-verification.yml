name: BrainBattle E2E Test Verification

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  e2e-verification:
    name: E2E & Frontend Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BrainBattleE2E/package-lock.json

      - name: Install E2E Dependencies
        working-directory: BrainBattleE2E
        run: npm install

      - name: Run E2E Verification & Generate Report
        run: node BrainBattleE2E/scripts/verify_and_report.js
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

      - name: Upload E2E Verification Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brainbattle-e2e-verification-report
          path: BrainBattleE2E/brainbattle-e2e-report.xlsx
          if-no-files-found: ignore
          retention-days: 30
