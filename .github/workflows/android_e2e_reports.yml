name: 📱 Android E2E Report Generator

on:
  push:
    branches: ["main", "master"]
    paths:
      - 'BrainBattle/**'
  pull_request:
    branches: ["main", "master"]
    paths:
      - 'BrainBattle/**'
  workflow_dispatch:

jobs:
  android-e2e-tests:
    name: 🤖 Android Connected E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix:
        api-level: [28]
        target: [default]
        arch: [x86_64]

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: 🔧 Grant Execute Permission for Gradlew
        working-directory: BrainBattle
        run: chmod +x gradlew

      - name: ⚡ Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: 🤖 Run Android Instrumented E2E Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          profile: Nexus 6
          avd-name: test_avd
          working-directory: BrainBattle
          script: ./gradlew connectedAndroidTest --stacktrace

      - name: 📊 Upload Android E2E Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Android-E2E-Report-HTML
          path: BrainBattle/app/build/reports/androidTests/connected/
          retention-days: 30
          if-no-files-found: ignore
