name: 🛡️ Backend Security Review

on:
  push:
    branches: ["main", "master"]
    paths:
      - "BrainBattleBackend/**"
      - ".github/workflows/security-review.yml"
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: security-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: 🛡️ Security Discovery, SAST & Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Source ────────────────────────────────────────────────
      - name: ⬇️  Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Environment ─────────────────────────────────────
      - name: 🟢  Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: BrainBattleE2E/package-lock.json

      - name: 📦  Install ExcelJS & dependencies
        working-directory: BrainBattleE2E
        run: npm install

      # ── 3. Technology Detection & Security Run ───────────────────
      - name: 🔍 Detect Backend Technology & Run Security Audit
        run: |
          echo "====================================================="
          echo "🔍 AUTOMATIC BACKEND TECHNOLOGY DETECTION"
          echo "====================================================="

          if [ -f "BrainBattleBackend/requirements.txt" ]; then
             echo "✅ Python Backend Framework Detected (Flask)"
             echo "TECH=Python/Flask" >> "$GITHUB_ENV"
          elif [ -f "BrainBattleBackend/package.json" ]; then
             echo "✅ Node.js Backend Framework Detected"
             echo "TECH=Node.js" >> "$GITHUB_ENV"
          else
             echo "✅ General Backend Framework Detected"
             echo "TECH=Generic" >> "$GITHUB_ENV"
          fi

          # NODE_PATH makes Node resolve 'exceljs' from BrainBattleE2E/node_modules
          # even though the script file lives in BrainBattleBackend/scripts/
          NODE_PATH="${GITHUB_WORKSPACE}/BrainBattleE2E/node_modules" \
            node BrainBattleBackend/scripts/generateSecuritySuite.js

      # ── 4. Upload Security Artifacts ─────────────────────────────
      - name: 📤  Upload Vulnerability Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BrainBattle-Security-Review-${{ github.run_number }}
          path: Vulnerability_Test_Results/
          retention-days: 30

      # ── 5. Write GitHub Action Step Summary ──────────────────────
      - name: 📝  Write Step Summary
        if: always()
        run: |
          EXEC_FILE="${{ github.workspace }}/Vulnerability_Test_Results/executive-summary.md"
          REV_FILE="${{ github.workspace }}/Vulnerability_Test_Results/security-review.md"

          if [ -f "$EXEC_FILE" ]; then
            cat "$EXEC_FILE" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "---" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ⚠️ Executive summary not generated — check previous step logs." >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f "$REV_FILE" ]; then
            cat "$REV_FILE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ⚠️ Security review not generated — check previous step logs." >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── 6. Fail if Critical vulnerabilities were found ───────────
      - name: 🚨  Enforce Zero-Critical Policy
        if: always()
        run: |
          EXEC_FILE="${{ github.workspace }}/Vulnerability_Test_Results/executive-summary.md"
          if [ -f "$EXEC_FILE" ]; then
            CRITICAL=$(grep -oP '🔴 Critical \| \*\*\K[0-9]+' "$EXEC_FILE" || echo "0")
            echo "Critical findings detected: $CRITICAL"
            if [ "$CRITICAL" -gt 0 ]; then
              echo ""
              echo "❌ BUILD FAILED: ${CRITICAL} Critical severity vulnerability/vulnerabilities found."
              echo "   Resolve all Critical findings before merging to main."
              exit 1
            else
              echo "✅ Zero Critical vulnerabilities — policy check passed."
            fi
          fi
