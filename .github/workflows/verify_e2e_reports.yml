name: BrainBattle E2E & Mobile Test Verification

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  verify:
    name: Verify E2E Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Publish Test Results to Job Summary
        run: |
          python tests/publish_e2e_results.py

      - name: Upload E2E Test Report
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Test-Report
          path: tests/reports/E2E_Test_Report_BrainBattle_*.xlsx
          if-no-files-found: error

      - name: Upload Appium Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Test-Report
          path: tests/reports/Appium_Test_Report_BrainBattle_*.xlsx
          if-no-files-found: error
